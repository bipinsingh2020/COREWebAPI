name: Dev to Staging Pipeline

on:
  push:
    branches:
      - dev

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: echo "Build step"

      - name: Run Tests
        run: echo "Run tests"

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    environment: staging   # requires approval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment"
               ./deploy-staging.sh