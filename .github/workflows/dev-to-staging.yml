name: Auto PR Dev → Staging

on:
  push:
    branches:
      - dev

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup GitHub CLI
        uses: cli/gh-action@v2

      - name: Create PR to staging
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base staging --head dev --json number --jq '.[].number')
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --title "Dev → Staging" \
              --body "Automatic PR from dev to staging" \
              --base staging \
              --head dev
          else
            echo "PR already exists: #$PR_EXISTS"