name: Promote Staging to Main

on:
  push:
    branches:
      - staging

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create PR
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "Release: staging → main" \
            --body "Automated promotion"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}